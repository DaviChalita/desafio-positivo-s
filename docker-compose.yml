version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mongodb-positivo-s
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    restart: always
    depends_on:
      - mongodb
    environment:
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      MONGO_PASS: ${MONGO_PASS}
      MONGO_URL: ${MONGO_URL}
      MONGO_USER: ${MONGO_USER}
    ports:
      - "8000:80"

volumes:
  mongo_data: